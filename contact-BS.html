<!DOCTYPE html>
<html lang="en" class="h-100">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-GLhlTQ8iRABdZLl6O3oVMWSktQOp6b7In1Zl3/Jr59b6EGGoI1aFkw7cmDA6j6gD"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css"
      integrity="sha512-SzlrxWUlpfuzQ+pcUCosxcglQRNAq/DZjVsC0lE40xsADsfeQoEypE+enwcOiGjk/bSuGGKHEyjSoQ1zVisanQ=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.1/css/all.min.css"
      integrity="sha512-MV7K8+y+gLIBoVD59lQIYicR65iaqukzvf/nwasF0nqhPay5w/9lJmVM2hMDcnK1OnMGCdVK+iQrJ7lzPJQd1w=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Yiğit Bayraktaroğlu</title>
  </head>
  <body class="h-100 d-flex flex-column">
    <main>
      <div class="container my-4">
        <a class="btn btn-primary" href="index.html" role="button"
          ><i class="fa-sharp fa-solid fa-arrow-left text-light"></i>Ana
          Sayfa</a
        >
        <h2 class="my-3">Bana Ulaş</h2>
        <div class="row g-2">
          <div class="col-md-6">
            <div class="card bg-dark">
              <div class="card-body">
                <div class="alert alert-warning">Lütfen formu doldurunuz.</div>
              </div>
              <form class="row g-3 text-white">
                <div class="col-md-6">
                  <label for="email" class="form-label">Email</label>
                  <input
                    type="email"
                    name="email"
                    id="email"
                    class="form-control"
                  />
                </div>
                <div class="col-md-6">
                  <label for="name" class="form-label">İsim</label>
                  <input
                    type="text"
                    name="name"
                    id="name"
                    class="form-control"
                  />
                </div>
                <div class="col-md-12">
                  <label for="name" class="form-label">Telefon</label>
                  <input
                    type="text"
                    name="phone"
                    id="phone"
                    class="form-control"
                  />
                </div>
                <div class="col-md-12">
                  <label for="subject" class="form-label">Başlık</label>
                  <input
                    type="text"
                    name="subject"
                    id="subject"
                    class="form-control"
                  />
                </div>
                <div class="col-md-12">
                  <label for="message" class="form-label">Mesaj</label>
                  <textarea
                    name="message"
                    id="message"
                    class="form-control"
                  ></textarea>
                </div>
                <div class="col-12">
                  <button class="btn btn-outline-warning" style="width: 100%">
                    Gönder
                  </button>
                </div>
              </form>
            </div>
          </div>
          <div class="col-md-6">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d6202.740678394194!2d29.1332256447401!3d40.95781686744467!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14cac78eeeea853f%3A0x19a1125c39e28f7d!2sMarmara%20%C3%9Cniversitesi%20Teknoloji%20Fak%C3%BCltesi!5e0!3m2!1str!2str!4v1681825162426!5m2!1str!2str"
              width="600"
              height="450"
              style="border: 0"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              id="map"
            ></iframe>
          </div>
        </div>
      </div>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-w76AqPfDkMBDXo30jS1Sgez6pr3x5MlQ1ZAGC+nuZB+EYdgRZgiwxhTBTkF7CXvN"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
